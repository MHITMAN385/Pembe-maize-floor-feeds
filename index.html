<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pembe Maize Flour Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f8f8f8;
    }
    header {
      background: #ffcc00;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .product {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .product img {
      width: 100%;
      border-radius: 10px;
    }
    .price {
      color: green;
      font-size: 20px;
      margin: 10px 0;
    }
    button {
      background: #ffcc00;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #e6b800;
    }
  </style>
</head>
<body>

<header>Pembe Maize Flour Store 🌽</header>

<div class="container">

  <div class="product">
    <img src="https://via.placeholder.com/250" alt="2kg Pembe Flour">
    <h3>Pembe Maize Flour 2kg</h3>
    <p class="price">KSh 180</p>
    <button onclick="buyProduct('2kg Flour')">Buy Now</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/250" alt="5kg Pembe Flour">
    <h3>Pembe Maize Flour 5kg</h3>
    <p class="price">KSh 400</p>
    <button onclick="buyProduct('5kg Flour')">Buy Now</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/250" alt="10kg Pembe Flour">
    <h3>Pembe Maize Flour 10kg</h3>
    <p class="price">KSh 750</p>
    <button onclick="buyProduct('10kg Flour')">Buy Now</button>
  </div>

</div>

<script>
  function buyProduct(product) {
    alert('You selected ' + product + '. Order feature coming soon!');
  }
</script>

</body>
</html>
